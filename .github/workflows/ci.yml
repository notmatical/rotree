name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint + format (Biome)
        run: bun run check

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Pack + smoke-test the published artifact
        run: |
          tarball=$(npm pack | tail -1)
          npm i -g "./$tarball"
          rotree --help
          mkdir -p /tmp/smoke/src
          printf 'return true\n' > /tmp/smoke/src/greeter.server.luau
          (cd /tmp/smoke && rotree -m luau)
          test -f /tmp/smoke/default.project.json && echo "smoke: generated default.project.json"
