name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact_name: rogen
            asset_name: rogen-${{ github.ref_name }}-linux-x86_64.tar.gz
            compress_cmd: tar -czf
          - os: windows-latest
            target: win-x64
            artifact_name: rogen.exe
            asset_name: rogen-${{ github.ref_name }}-windows-x86_64.zip
            compress_cmd: Compress-Archive -Path rogen.exe -DestinationPath
          - os: macos-latest
            target: macos-x64
            artifact_name: rogen
            asset_name: rogen-${{ github.ref_name }}-macos-x86_64.zip
            compress_cmd: zip -r
          - os: macos-latest
            target: macos-arm64
            artifact_name: rogen
            asset_name: rogen-${{ github.ref_name }}-macos-arm64.zip
            compress_cmd: zip -r

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Corrected: Uses standard Clean Install

      - name: Compile Script to Binary
        run: npx pkg . --target node18-${{ matrix.target }} --output ${{ matrix.artifact_name }}

      - name: Archive Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: ${{ matrix.compress_cmd }} ${{ matrix.asset_name }}

      - name: Archive Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: ${{ matrix.compress_cmd }} ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}