name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release (changesets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs npm >= 11.5.1; setup-node ships npm 10.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
          # The rokit release job below owns the GitHub Release (with binaries).
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  binaries:
    name: Build rokit binaries
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install
        run: bun install --frozen-lockfile

      # Bun cross-compiles every target from this single Linux runner.
      - name: Cross-compile standalone binaries
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          mkdir -p out
          build() {
            target="$1"; label="$2"; bin="$3"
            bun build --compile --minify --target="$target" bin/rotree.ts --outfile "out/$bin"
            (cd out && zip -q "rotree-${version}-${label}.zip" "$bin" && rm -f "$bin")
          }
          build bun-linux-x64    linux-x86_64   rotree
          build bun-darwin-x64   macos-x86_64   rotree
          build bun-darwin-arm64 macos-aarch64  rotree
          build bun-windows-x64  windows-x86_64 rotree.exe

      - name: Create GitHub Release with rokit binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          files: out/*.zip
